version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  coordinator:
    build:
      context: .
      dockerfile: coordinator-go/Dockerfile
    ports:
      - "25565:25565"
      - "50051:50051"
    environment:
      - PROXY_ADDR=:25565
      - GRPC_ADDR=:50051
      - REDIS_ADDR=redis:6379
      - STORAGE_PATH=/data
      - MAX_PLAYERS=100000
      - SHARD_CAPACITY=2000
    volumes:
      - coordinator-data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "25565"]
      interval: 10s
      timeout: 5s
      retries: 5

  shard-1:
    build:
      context: .
      dockerfile: shard/Dockerfile
    ports:
      - "25566:25566"
    environment:
      - SHARD_ID=shard-1
      - PORT=25566
      - CAPACITY=2000
      - MASTER_ADDRESS=coordinator:50051
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - coordinator

  shard-2:
    build:
      context: .
      dockerfile: shard/Dockerfile
    ports:
      - "25567:25567"
    environment:
      - SHARD_ID=shard-2
      - PORT=25567
      - CAPACITY=2000
      - MASTER_ADDRESS=coordinator:50051
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - coordinator

  shard-3:
    build:
      context: .
      dockerfile: shard/Dockerfile
    ports:
      - "25568:25568"
    environment:
      - SHARD_ID=shard-3
      - PORT=25568
      - CAPACITY=2000
      - MASTER_ADDRESS=coordinator:50051
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - coordinator

volumes:
  redis-data:
  coordinator-data:
version: '3.8'

services:
  nats:
    image: nats:2-alpine
    command: "--js --store_dir /data --http_port 8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  coordinator:
    build:
      context: .
      dockerfile: docker/Dockerfile.coordinator
    ports:
      - "50051:50051"
      - "8080:8080"
    environment:
      - PORT=50051
      - HTTP_PORT=8080
      - HEARTBEAT_TIMEOUT=30s
    depends_on:
      - nats

  proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.proxy
    ports:
      - "25565:25565"
    environment:
      - LISTEN_ADDR=:25565
      - COORDINATOR_ADDR=coordinator:50051
    depends_on:
      - coordinator

  shard-1:
    build:
      context: .
      dockerfile: docker/Dockerfile.shard
    environment:
      - SHARD_ID=shard-1
      - PORT=25566
      - COORDINATOR_HOST=coordinator
      - COORDINATOR_PORT=50051
      - NATS_HOST=nats
      - REDIS_HOST=redis
      - MINIO_HOST=minio
    depends_on:
      - coordinator
      - nats
      - redis
      - minio

volumes:
  nats-data:
  redis-data:
  minio-data:

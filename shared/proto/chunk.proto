syntax = "proto3";

package shardedmc.v2;

option go_package = "github.com/shardedmc/v2/shared/proto;shardedmc";

import "shared/proto/common.proto";

message SectionData {
  int32 y = 1;
  bytes block_palette = 2;
  bytes block_data = 3;
  bytes sky_light = 4;
  bytes block_light = 5;
}

message ChunkData {
  int32 x = 1;
  int32 z = 2;
  repeated SectionData sections = 3;
  int64 last_modified = 4;
  int32 version = 5;
}

message ChunkRequest {
  ChunkCoord coord = 1;
  string requesting_shard = 2;
}

message ChunkResponse {
  ChunkData chunk = 1;
  bool found = 2;
  string owner_shard = 3;
}

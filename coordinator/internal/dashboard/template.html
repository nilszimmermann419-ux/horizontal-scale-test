<!DOCTYPE html>
<html>
<head>
  <title>ShardedMC Dashboard</title>
  <style>
    body { 
      font-family: monospace; 
      background: #1a1a1a; 
      color: #0f0; 
      margin: 0; 
      padding: 20px; 
    }
    h1 { 
      color: #0f0; 
      border-bottom: 2px solid #0f0; 
      padding-bottom: 10px; 
    }
    .section { 
      margin: 20px 0; 
      padding: 15px; 
      border: 1px solid #333; 
      background: #222; 
    }
    .shard { 
      border: 1px solid #0f0; 
      padding: 10px; 
      margin: 5px; 
      display: inline-block; 
      min-width: 200px; 
    }
    .online { 
      color: #0f0; 
      border-color: #0f0; 
    }
    .offline { 
      color: #f00; 
      border-color: #f00; 
    }
    .region { 
      display: inline-block; 
      width: 20px; 
      height: 20px; 
      border: 1px solid #333; 
      margin: 1px; 
    }
    .region-allocated { 
      background: #0f0; 
    }
    .region-unallocated { 
      background: #333; 
    }
    .metric { 
      display: inline-block; 
      margin: 10px; 
      padding: 10px; 
      border: 1px solid #0f0; 
    }
    .metric-label { 
      font-size: 0.8em; 
      color: #888; 
    }
    .metric-value { 
      font-size: 1.5em; 
      color: #0f0; 
    }
    .player { 
      display: inline-block; 
      margin: 2px; 
      padding: 3px 8px; 
      background: #0f0; 
      color: #000; 
      font-size: 0.8em; 
    }
    #event-throughput { 
      font-size: 1.2em; 
      color: #ff0; 
    }
    .load-bar { 
      width: 100%; 
      height: 10px; 
      background: #333; 
      margin-top: 5px; 
    }
    .load-fill { 
      height: 100%; 
      background: #0f0; 
    }
    .load-high { 
      background: #f80; 
    }
    .load-critical { 
      background: #f00; 
    }
  </style>
</head>
<body>
  <h1>ShardedMC v2.0 Dashboard</h1>
  
  <div class="section">
    <h2>System Metrics</h2>
    <div id="metrics"></div>
  </div>

  <div class="section">
    <h2>Shards</h2>
    <div id="shards"></div>
  </div>

  <div class="section">
    <h2>Region Allocation Map</h2>
    <div id="regions"></div>
  </div>

  <div class="section">
    <h2>Player Locations</h2>
    <div id="players"></div>
  </div>

  <div class="section">
    <h2>Event Throughput</h2>
    <div id="event-throughput">Loading...</div>
  </div>

  <script>
    setInterval(loadAllData, 5000);
    
    function loadAllData() {
      loadShards();
      loadRegions();
      loadPlayers();
      loadMetrics();
      loadEventThroughput();
    }

    function loadShards() {
      fetch('/api/shards').then(r => r.json()).then(data => {
        const container = document.getElementById('shards');
        if (!data || data.length === 0) {
          container.innerHTML = '<div style="color: #888;">No shards registered</div>';
          return;
        }
        container.innerHTML = data.map(s => {
          const loadPercent = (s.load * 100).toFixed(1);
          const loadClass = s.load > 0.9 ? 'load-critical' : s.load > 0.7 ? 'load-high' : '';
          return `<div class="shard ${s.healthy ? 'online' : 'offline'}">
            <strong>${s.id}</strong><br>
            Players: ${s.players}/${s.capacity}<br>
            Load: ${loadPercent}%<br>
            <div class="load-bar"><div class="load-fill ${loadClass}" style="width: ${loadPercent}%"></div></div>
          </div>`;
        }).join('');
      }).catch(err => {
        document.getElementById('shards').innerHTML = '<div style="color: #f00;">Failed to load shards</div>';
      });
    }

    function loadRegions() {
      fetch('/api/regions').then(r => r.json()).then(data => {
        const container = document.getElementById('regions');
        if (!data || data.length === 0) {
          container.innerHTML = '<div style="color: #888;">No regions allocated</div>';
          return;
        }
        let html = '<div style="font-family: monospace; line-height: 0;">';
        for (let z = -5; z <= 5; z++) {
          for (let x = -5; x <= 5; x++) {
            const key = x + ':' + z;
            const allocated = data[key];
            html += `<div class="region ${allocated ? 'region-allocated' : 'region-unallocated'}" title="${key}: ${allocated || 'unallocated'}"></div>`;
          }
          html += '<br style="clear: both;">';
        }
        html += '</div>';
        container.innerHTML = html;
      }).catch(err => {
        document.getElementById('regions').innerHTML = '<div style="color: #f00;">Failed to load regions</div>';
      });
    }

    function loadPlayers() {
      fetch('/api/players').then(r => r.json()).then(data => {
        const container = document.getElementById('players');
        if (!data || !data.players || data.players.length === 0) {
          container.innerHTML = '<div style="color: #888;">No players online</div>';
          return;
        }
        container.innerHTML = `<div>Total Players: ${data.count}</div>` +
          data.players.map(p => `<span class="player">${p.id} @ ${p.shard}</span>`).join('');
      }).catch(err => {
        document.getElementById('players').innerHTML = '<div style="color: #f00;">Failed to load players</div>';
      });
    }

    function loadMetrics() {
      fetch('/api/metrics').then(r => r.json()).then(data => {
        const container = document.getElementById('metrics');
        container.innerHTML = `
          <div class="metric">
            <div class="metric-label">Memory</div>
            <div class="metric-value">${data.memory_mb} MB</div>
          </div>
          <div class="metric">
            <div class="metric-label">CPU</div>
            <div class="metric-value">${data.cpu_percent}%</div>
          </div>
          <div class="metric">
            <div class="metric-label">Goroutines</div>
            <div class="metric-value">${data.goroutines}</div>
          </div>
          <div class="metric">
            <div class="metric-label">Uptime</div>
            <div class="metric-value">${data.uptime}</div>
          </div>
        `;
      }).catch(err => {
        document.getElementById('metrics').innerHTML = '<div style="color: #f00;">Failed to load metrics</div>';
      });
    }

    function loadEventThroughput() {
      fetch('/api/metrics').then(r => r.json()).then(data => {
        document.getElementById('event-throughput').innerHTML = 
          `Events/sec: ${data.events_per_sec} | Total Events: ${data.total_events}`;
      }).catch(err => {
        document.getElementById('event-throughput').innerHTML = '<span style="color: #f00;">Failed to load throughput</span>';
      });
    }

    loadAllData();
  </script>
</body>
</html>
